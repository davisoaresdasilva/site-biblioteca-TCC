<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech - Acesso</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Importando fontes elegantes do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Lado da Imagem (Decorativo) -->
            <div class="login-image-side">
                <div class="overlay-content">
                    <h2 id="frase-destaque"></h2>
                    <p id="autor-frase"></p>
                </div>
            </div>

            <!-- Lado do Formulário -->
            <div class="login-form-side">
                <!-- Botão de Modo Noturno -->
                <div class="theme-switch-wrapper" style="position: absolute; top: 20px; right: 20px;">
                    <label class="theme-switch" for="theme-toggle">
                        <input type="checkbox" id="theme-toggle" />
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="login-header">
                    <h1>Acessar</h1>
                    <p>Acesse o portal de gestão do conhecimento.</p>
                </div>
                
                <form onsubmit="realizarLogin(event)" novalidate>
                    <div class="form-group">
                        <label for="usuario">Usuário / Matrícula</label>
                        <input type="text" id="usuario" placeholder="Ex: admin" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Sua senha" required>
                    </div>

                    <button type="submit" class="btn-primary full-width">Entrar</button>
                </form>
                
                <div class="login-footer">
                    <a href="#" onclick="abrirModalRecuperarSenha(event)">Esqueci minha senha</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Recuperação de Senha -->
    <div id="recuperar-senha-modal" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <span class="close-button" onclick="fecharModalRecuperarSenha()">&times;</span>
            <h2>Redefinir Senha</h2>
            <p>Informe sua matrícula ou e-mail para iniciar a redefinição. (Simulação)</p>
            <form onsubmit="recuperarSenha(event)">
                <div class="form-group">
                    <label for="matricula-recuperar">Matrícula ou E-mail</label>
                    <input type="text" id="matricula-recuperar" placeholder="Sua matrícula" required>
                </div>
                <button type="submit" class="btn-primary full-width">Recuperar</button>
            </form>
            <div id="resultado-recuperacao" style="margin-top: 20px; text-align: center;"></div>
        </div>
    </div>

    <!-- Tela de Carregamento com Animação de Livro -->
    <div id="loading-overlay">
        <div class="book">
            <div class="book__pg-shadow"></div>
            <div class="book__pg"></div>
            <div class="book__pg book__pg--2"></div>
            <div class="book__pg book__pg--3"></div>
            <div class="book__pg book__pg--4"></div>
            <div class="book__pg book__pg--5"></div>
        </div>
        <p>Verificando, aguarde...</p>
    </div>

    <!-- Tela de Sucesso (Acesso Concedido) -->
    <div id="success-overlay">
        <div class="success-icon">✔️</div>
        <div class="success-message">Acesso Concedido!</div>
        <p style="margin-top: 10px; font-size: 1.1rem; opacity: 0.9;">Redirecionando para a BiblioTech...</p>
    </div>

    <script>
        // Redirecionamento automático: se o usuário já estiver logado, vai direto para a home
        if (localStorage.getItem('usuarioLogado')) {
            window.location.href = "index.html";
        }

        // Frases motivacionais aleatórias
        const frases = [
            { texto: "Um livro é um sonho que você segura na mão.", autor: "Neil Gaiman" },
            { texto: "Ler é viajar sem sair do lugar.", autor: "Autor Desconhecido" },
            { texto: "A leitura engrandece a alma.", autor: "Voltaire" },
            { texto: "Quem não lê, mal fala, mal ouve, mal vê.", autor: "Malba Tahan" },
            { texto: "Muitos homens iniciaram uma nova era na sua vida a partir da leitura de um livro.", autor: "Henry David Thoreau" },
            { texto: "Os livros não mudam o mundo, quem muda o mundo são as pessoas. Os livros só mudam as pessoas.", autor: "Mário Quintana" },
            { texto: "A leitura é para o intelecto o que o exercício é para o corpo.", autor: "Joseph Addison" },
            { texto: "Sempre imaginei que o paraíso fosse uma espécie de livraria.", autor: "Jorge Luis Borges" }
        ];

        // Seleciona uma frase aleatória ao carregar
        const fraseEl = document.getElementById('frase-destaque');
        const autorEl = document.getElementById('autor-frase');
        
        const indiceAleatorio = Math.floor(Math.random() * frases.length);
        fraseEl.textContent = `"${frases[indiceAleatorio].texto}"`;
        autorEl.textContent = `– ${frases[indiceAleatorio].autor}`;

        // --- Lógica do Modo Noturno ---
        const darkModeToggle = document.getElementById('theme-toggle');

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        // Aplica o tema ao carregar a página
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            if (darkModeToggle) darkModeToggle.checked = true;
        }

        // Adiciona o evento de clique ao botão
        if (darkModeToggle) {
            darkModeToggle.addEventListener('change', toggleDarkMode);
        }
        // --- Fim da Lógica do Modo Noturno ---

        // --- Lógica de Recuperação de Senha ---
        // OBS: A lista de alunos é duplicada aqui para a simulação,
        // pois a página de login não carrega o script.js principal.

        /**
         * Gera um som de sucesso (arpejo ascendente) via Web Audio API
         */
        function playSuccessSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const frequencias = [523.25, 659.25, 783.99, 1046.50]; // Notas C5, E5, G5, C6
                
                frequencias.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.1));
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime + (i * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.1) + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + (i * 0.1));
                    osc.stop(audioCtx.currentTime + (i * 0.1) + 0.4);
                });
            } catch (e) { console.warn("Áudio bloqueado."); }
        }

        /**
         * Gera partículas de confete na tela de sucesso
         */
        function lancarConfetes() {
            const overlay = document.getElementById('success-overlay');
            const cores = ['#f1c40f', '#e74c3c', '#3498db', '#9b59b6', '#2ecc71', '#f39c12', '#ffffff'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                // Posicionamento e estilo aleatório
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
                confetti.style.width = (Math.random() * 8 + 5) + 'px';
                confetti.style.height = (Math.random() * 8 + 5) + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
                confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                
                overlay.appendChild(confetti);
            }
        }

        const mockAlunos = [
            { id: 1, nome: 'Maria Oliveira', matricula: 'RA001', senha: '123', email: 'maria.o@email.com' },
            { id: 2, nome: 'Pedro Santos', matricula: 'RA002', senha: '456', email: 'pedro.s@email.com' },
            { id: 3, nome: 'Davi Soares', matricula: 'admin', senha: 'admin', email: 'davi.s@email.com' }
        ];

        const modalRecuperar = document.getElementById('recuperar-senha-modal');
        const resultadoRecuperacaoEl = document.getElementById('resultado-recuperacao');

        function abrirModalRecuperarSenha(event) {
            event.preventDefault();
            resultadoRecuperacaoEl.innerHTML = ''; // Limpa resultados anteriores
            document.getElementById('matricula-recuperar').value = ''; // Limpa input
            modalRecuperar.style.display = 'flex';
        }

        function fecharModalRecuperarSenha() {
            const content = modalRecuperar.querySelector('.modal-content');
            if (content) {
                content.classList.add('closing');
                content.addEventListener('animationend', () => {
                    modalRecuperar.style.display = 'none';
                    content.classList.remove('closing');
                }, { once: true });
            } else {
                modalRecuperar.style.display = 'none';
            }
        }

        function recuperarSenha(event) {
            event.preventDefault();
            const identificador = document.getElementById('matricula-recuperar').value.toLowerCase();
            const alunoEncontrado = mockAlunos.find(aluno => 
                aluno.matricula.toLowerCase() === identificador || 
                (aluno.email && aluno.email.toLowerCase() === identificador));

            if (alunoEncontrado && alunoEncontrado.email) {
                resultadoRecuperacaoEl.innerHTML = `<p style="color: #27ae60; font-weight: bold;">Instruções para redefinir a senha foram enviadas para o e-mail: <strong>${alunoEncontrado.email}</strong></p>`;
            } else {
                resultadoRecuperacaoEl.innerHTML = `<p style="color: #e74c3c; font-weight: bold;">Usuário não encontrado. Verifique a matrícula e tente novamente.</p>`;
            }
        }

        // Fecha o modal se clicar fora dele
        window.addEventListener('click', (event) => { if (event.target == modalRecuperar) fecharModalRecuperarSenha(); });
        // --- Fim da Lógica de Recuperação de Senha ---

        function realizarLogin(event) {
            event.preventDefault();

            const usuarioInput = document.getElementById('usuario');
            const senhaInput = document.getElementById('senha');
            const loginCard = document.querySelector('.login-card');
            const loading = document.getElementById('loading-overlay');
            const success = document.getElementById('success-overlay');

            // Validação customizada com efeito de vibração
            if (!usuarioInput.value.trim() || !senhaInput.value.trim()) {
                loginCard.classList.add('shake');
                setTimeout(() => loginCard.classList.remove('shake'), 500);
                return;
            }

            const usuario = usuarioInput.value;

            // Mostra a tela de carregamento
            loading.style.display = 'flex';

            // Simula um tempo de processamento curto
            setTimeout(() => {
                loading.style.display = 'none';
                
                // Liberação total: qualquer usuário e senha são aceitos
                localStorage.setItem('usuarioLogado', usuario);
                localStorage.setItem('userRole', usuario.toLowerCase() === 'admin' ? 'admin' : 'user');

                // Ativa a animação de sucesso
                success.style.display = 'flex';
                playSuccessSound(); // Toca o som simultaneamente com a animação
                lancarConfetes();   // Dispara os confetes

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2200); // Tempo para o usuário ver a animação
            }, 1200);
        }
    </script>
</body>
</html>
